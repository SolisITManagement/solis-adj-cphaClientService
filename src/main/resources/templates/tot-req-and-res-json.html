<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adjudication - Daily Totals and Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #fff8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .full-page {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .content {
      flex: 1;
      display: flex;
      padding: 10px;
      gap: 10px;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea, pre {
      flex: 1;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      border: 1px solid #ccc;
      overflow: auto;
      background-color: #fffdf9;
    }

    pre {
      background-color: #fff3e0;
      border-left: 4px solid #e67e22;
    }

    .submit-btn {
      padding: 15px;
      border-top: 1px solid #ccc;
      background-color: #fff3e0;
    }

    .btn-orange {
      background-color: #e67e22;
      color: white;
      width: 100%;
    }

    .btn-orange:hover {
      background-color: #d35400;
    }
    
    .btn-orange.btn-sm {
      background-color: #e67e22;
      color: white;
	  padding: 4px 12px;
	  font-size: 14px;
	  width: auto;
	}

    h1 {
      margin: 0;
      padding: 10px;
      background-color: #f7e9dd;
      border-bottom: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="full-page">
    <!-- Top Bar -->
    <div class="p-2 bg-light border-bottom d-flex justify-content-between align-items-center">
        <form action="/" method="get" style="margin: 0;">
	    	<button type="submit" class="btn btn-orange btn-sm">← Return to Main</button>
	  </form>
      <form method="post" action="/retryTotResponse" style="margin: 0;">
        <button type="submit" class="btn btn-warning">Retry</button>
      </form>
    </div>
    
    <h1>Totals and Details</h1>
    <form id="jsonTotForm" method="post" action="/totals" class="content">
      <!-- Request Panel -->
      <div class="panel">
        <label for="jsonTotInput" class="form-label">Request JSON</label>
        <textarea id="jsonTotInput" name="jsonTotData" th:text="${jsonTotData}"></textarea>
      </div>

      <!-- Response Panel -->
      <div class="panel">
        <label class="form-label">Response</label>
        <pre th:text="${totResponse}" th:style="${totResponse} != null ? 'display: block;' : 'display: none;'">No response yet</pre>
      </div>
    </form>

    <div class="submit-btn">
      <button type="submit" form="jsonTotForm" class="btn btn-orange">Submit JSON</button>
    </div>
  </div>
</body>
</html>
