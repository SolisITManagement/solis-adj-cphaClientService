<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adjudication - Daily Totals and Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #fff8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .full-page {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .content {
      flex: 1;
      display: flex;
      padding: 10px;
      gap: 10px;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    textarea, pre {
      flex: 1;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      border: 1px solid #ccc;
      overflow: auto;
      background-color: #fffdf9;
    }

    pre {
      background-color: #fff3e0;
      border-left: 4px solid #e67e22;
    }

    .submit-btn {
      padding: 15px;
      border-top: 1px solid #ccc;
      background-color: #fff3e0;
    }

    .btn-orange {
      background-color: #e67e22;
      color: white;
      width: 100%;
    }

    .btn-orange:hover {
      background-color: #d35400;
    }
    
    .btn-orange.btn-sm {
      background-color: #e67e22;
      color: white;
	  padding: 4px 12px;
	  font-size: 14px;
	  width: auto;
	}

    h1 {
      margin: 0;
      padding: 10px;
      background-color: #f7e9dd;
      border-bottom: 1px solid #ccc;
    }
  </style>
</head>
<body>
<div class="full-page">
  <!-- Top Bar -->
  <div class="p-2 bg-light border-bottom d-flex justify-content-between align-items-center">
    <form action="/adjudication" method="get" style="margin: 0;">
      	<button type="submit" class="btn btn-orange btn-sm">← Back to Adjudication</button>
    </form>
    <form method="post" action="/retryTotals" style="margin: 0;">
      <button type="submit" class="btn btn-warning">Retry</button>
    </form>
  </div>

  <h1>Totals and Details</h1>
  <form id="jsonTotForm" method="post" action="/totals" class="d-flex flex-row justify-content-between" style="gap: 10px; padding: 10px;">
    <!-- Request Panel -->
    <div class="panel" style="width: 48%; height: 500px; display: flex; flex-direction: column;">
      <label for="jsonTotInput" class="form-label">Request JSON</label>
      <textarea id="jsonTotInput" name="jsonTotData" class="form-control"
                style="flex: 1; resize: none; overflow: auto; height: 100%;" th:text="${jsonTotData}"></textarea>
    </div>

    <!-- Response Panel -->
    <div class="panel" style="width: 48%; height: 500px; display: flex; flex-direction: column;">
      <label class="form-label">Response</label>
      <pre th:text="${totResponse}"
           style="flex: 1; overflow: auto; height: 100%; background-color: #fff3e0; border-left: 4px solid #e67e22; padding: 10px; margin: 0;">
No response yet
      </pre>
        <div th:if="${executionTime != null}" style="margin-top: 5px; font-size: 13px; color: #555;">
    		Execution Time: <span th:text="${executionTime}">0.000</span> seconds
  		</div>
    </div>
  </form>

  <div class="submit-btn">
    <button type="submit" form="jsonTotForm" class="btn btn-orange w-100">Submit JSON</button>
  </div>
</div>
</body>
</html>
