<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CPhA Submission Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f8fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      padding: 30px;
      max-width: 500px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      border-radius: 12px;
      background-color: #ffffff;
    }

    .btn-orange {
      background-color: #e67e22;
      color: white;
      border: none;
    }

    .btn-orange:hover {
      background-color: #d35400;
    }

    .btn + .btn {
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card text-center">
    <h2 class="mb-4">Welcome to CPhA Adjudication</h2>
    <p class="mb-4">Click below to submit your Request..</p>
    <a href="/jsononly" class="btn btn-orange btn-lg w-100">Adjudicate Claim</a>
    <a href="/total-and-details" class="btn btn-orange btn-lg w-100">Totals &amp; Details Report</a>
  </div>
</body>
</html>
