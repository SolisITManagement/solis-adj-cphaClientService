# Load Balancer base URL (HTTPS on port 443, self-signed cert solis-dis-and-adj-cert).
# The local JVM truststore must trust solis-dis-and-adj-cert.pem (see prod-setup-runbook.md Step 10).
gateway.base-url=https://${GATEWAY_HOST:34.98.75.115}

# SSL trust store - promoted to javax.net.ssl.trustStore* by TrustStoreEnvironmentPostProcessor
# before any outbound HTTPS call is made. Defaults to ~/.solis/solis-truststore.jks so the
# operator only needs to place the file there once; override via SOLIS_TRUSTSTORE_PATH env var.
gateway.ssl.trust-store=${SOLIS_TRUSTSTORE_PATH:${user.home}/.solis/solis-truststore.jks}
gateway.ssl.trust-store-password=${SOLIS_TRUSTSTORE_PASSWORD:changeit}
gateway.ssl.trust-store-type=JKS

target.adjudicate.service.url=${gateway.base-url}/publish
target.adjudicate.service.retry.url=${gateway.base-url}/retryAdjResponse
target.totals.service.url=${gateway.base-url}/totals
target.dis.bc.hl7.event.url=${gateway.base-url}/api/dis/bc/publish
target.dis.nl.hl7.event.url=${gateway.base-url}/api/dis/nl/publish

# API key from Secret Manager
gateway.api-key=${sm://solis-dis-gateway-api-key}
